<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قالب الأسعار - مع أمثلة جاهزة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #11998e;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(240, 147, 251, 0.3);
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px;
            border: 1px solid #e0e0e0;
            text-align: right;
        }
        td input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        td input:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
        }
        .row-number {
            background: #f8f9fa;
            font-weight: bold;
            color: #11998e;
            text-align: center;
            width: 50px;
        }
        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .info-box {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box h3 {
            color: #0c5460;
            margin-bottom: 10px;
        }
        .info-box p {
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 قالب الأسعار - مع أمثلة جاهزة</h1>
        <p class="subtitle">يمكنك تعديل الأمثلة أو حذفها وإضافة خدماتك الخاصة</p>

        <div class="info-box">
            <h3>💡 ملاحظة:</h3>
            <p>هذا القالب يحتوي على 10 أمثلة جاهزة. يمكنك تعديلها أو حذفها وإضافة خدماتك الخاصة، ثم تنزيل الملف.</p>
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="downloadExcel()">
                📥 تنزيل Excel
            </button>
            <button class="btn-warning" onclick="clearAll()">
                🗑️ مسح جميع الأمثلة
            </button>
        </div>

        <div class="table-container">
            <table id="priceTable">
                <thead>
                    <tr>
                        <th class="row-number">#</th>
                        <th>اسم الخدمة *</th>
                        <th>التصنيف *</th>
                        <th>السعر *</th>
                        <th>السعر إلى</th>
                        <th>العملة</th>
                        <th>المدة</th>
                        <th>الوصف</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- سيتم إضافة الأمثلة ديناميكياً -->
                </tbody>
            </table>
        </div>

        <div class="success-message" id="successMessage">
            ✅ تم تنزيل الملف بنجاح!
        </div>
    </div>

    <script>
        // الأمثلة الجاهزة
        const examples = [
            {
                service: "استشارة عامة",
                category: "استشارة",
                price: "100",
                priceTo: "200",
                currency: "ر.س",
                duration: "30 دقيقة",
                description: "استشارة طبية عامة مع طبيب"
            },
            {
                service: "استشارة متخصصة",
                category: "استشارة",
                price: "200",
                priceTo: "300",
                currency: "ر.س",
                duration: "45 دقيقة",
                description: "استشارة مع طبيب متخصص"
            },
            {
                service: "فحص دم شامل",
                category: "تحليل",
                price: "150",
                priceTo: "",
                currency: "ر.س",
                duration: "",
                description: "فحص دم شامل مع جميع التحاليل"
            },
            {
                service: "تحليل سكر تراكمي",
                category: "تحليل",
                price: "80",
                priceTo: "",
                currency: "ر.س",
                duration: "",
                description: "تحليل السكر التراكمي HbA1c"
            },
            {
                service: "أشعة سينية",
                category: "أشعة",
                price: "120",
                priceTo: "",
                currency: "ر.س",
                duration: "15 دقيقة",
                description: "أشعة سينية عادية"
            },
            {
                service: "أشعة مقطعية",
                category: "أشعة",
                price: "800",
                priceTo: "",
                currency: "ر.س",
                duration: "20 دقيقة",
                description: "أشعة مقطعية CT Scan"
            },
            {
                service: "رنين مغناطيسي",
                category: "أشعة",
                price: "1500",
                priceTo: "2000",
                currency: "ر.س",
                duration: "45 دقيقة",
                description: "رنين مغناطيسي MRI"
            },
            {
                service: "عملية جراحية بسيطة",
                category: "جراحة",
                price: "5000",
                priceTo: "7000",
                currency: "ر.س",
                duration: "يوم واحد",
                description: "عملية جراحية بسيطة مع إقامة"
            },
            {
                service: "عملية جراحية معقدة",
                category: "جراحة",
                price: "15000",
                priceTo: "20000",
                currency: "ر.س",
                duration: "3-5 أيام",
                description: "عملية جراحية معقدة مع إقامة"
            },
            {
                service: "تنظيف أسنان",
                category: "أسنان",
                price: "200",
                priceTo: "",
                currency: "ر.س",
                duration: "45 دقيقة",
                description: "تنظيف وتلميع الأسنان"
            }
        ];

        // إضافة صف
        function addRow(data) {
            const tbody = document.getElementById('tableBody');
            const rowCount = tbody.rows.length + 1;
            
            const row = tbody.insertRow();
            row.innerHTML = `
                <td class="row-number">${rowCount}</td>
                <td><input type="text" value="${data.service}" placeholder="اسم الخدمة"></td>
                <td><input type="text" value="${data.category}" placeholder="التصنيف"></td>
                <td><input type="number" value="${data.price}" placeholder="السعر"></td>
                <td><input type="number" value="${data.priceTo || ''}" placeholder="السعر إلى"></td>
                <td><input type="text" value="${data.currency}" placeholder="العملة"></td>
                <td><input type="text" value="${data.duration || ''}" placeholder="المدة"></td>
                <td><input type="text" value="${data.description || ''}" placeholder="الوصف"></td>
            `;
        }

        // تنزيل Excel
        function downloadExcel() {
            const tbody = document.getElementById('tableBody');
            const data = [];

            for (let row of tbody.rows) {
                const inputs = row.getElementsByTagName('input');
                const rowData = {
                    "اسم الخدمة": inputs[0].value,
                    "التصنيف": inputs[1].value,
                    "السعر": inputs[2].value,
                    "السعر إلى": inputs[3].value,
                    "العملة": inputs[4].value,
                    "المدة": inputs[5].value,
                    "الوصف": inputs[6].value,
                };
                
                if (rowData["اسم الخدمة"]) {
                    data.push(rowData);
                }
            }

            if (data.length === 0) {
                alert("لا توجد بيانات للتنزيل!");
                return;
            }

            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "الأسعار");

            worksheet['!cols'] = [
                { wch: 30 },
                { wch: 15 },
                { wch: 10 },
                { wch: 10 },
                { wch: 8 },
                { wch: 15 },
                { wch: 40 },
            ];

            XLSX.writeFile(workbook, "الأسعار_مع_أمثلة_" + new Date().toISOString().split('T')[0] + ".xlsx");
            
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        }

        // مسح الكل
        function clearAll() {
            if (confirm("هل أنت متأكد من مسح جميع الأمثلة؟")) {
                document.getElementById('tableBody').innerHTML = '';
            }
        }

        // إضافة الأمثلة عند بدء الصفحة
        window.onload = function() {
            examples.forEach(example => {
                addRow(example);
            });
        };
    </script>
</body>
</html>
